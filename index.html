<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Vehicle Registration</title>

<style>

:root{
--bg:#f7f7f7;
--text:#1a1a1a;
--card:#ffffff;
--primary:#002855;
--accent:#ff7f27;
--secondary-bg:#e6f0ff;
--header-bg:#002855;
--header-text:#ffffff;
}

[data-theme="dark"]{
--bg:#0d1117;
--text:#f0f0f0;
--card:#161b22;
--primary:#ffffff;
--secondary-bg:#1c293a;
--header-bg:#161b22;
--header-text:#ffffff;
}

html,body{
margin:0;
padding:0;
height:100%;
background:var(--bg);
color:var(--text);
font-family:Arial,Helvetica,sans-serif;
}

header{
background:var(--header-bg);
color:var(--header-text);
padding:1rem;
text-align:center;
position:relative;
}

header h1{
margin:0;
font-size:1.8rem;
}

.theme-toggle-container{
position:absolute;
right:15px;
top:15px;
}

.toggle-switch{
position:relative;
display:inline-block;
width:48px;
height:24px;
}

.toggle-switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
transition:.4s;
border-radius:34px;
}

.slider:before{
position:absolute;
content:"";
height:18px;
width:18px;
left:3px;
bottom:3px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background:var(--accent);
}

input:checked + .slider:before{
transform:translateX(24px);
}

main{
display:flex;
justify-content:center;
align-items:flex-start;
padding:1rem;
gap:2rem;
}

#leftPanel{
flex:1;
max-width:650px;
}

input[type="text"]{
width:100%;
padding:1rem;
font-size:1.2rem;
border:2px solid var(--primary);
border-radius:8px;
background:var(--card);
color:var(--text);
font-weight:bold;
text-transform:uppercase;
}

#result ul{
display:grid;
grid-template-columns:1fr 1fr;
gap:0.8rem;
padding:0;
list-style:none;
margin-top:1rem;
}

#result li{
background:var(--secondary-bg);
color:var(--primary);
font-weight:bold;
padding:0.7rem;
border-radius:8px;
text-align:center;
cursor:pointer;
}

#result li:hover{
background:var(--accent);
color:white;
}

#sidePanel{
width:460px;
background:var(--card);
border:2px solid var(--primary);
border-radius:10px;
padding:0.8rem;
box-sizing:border-box;
height:80vh;
display:flex;
flex-direction:column;
}

.tabs{
display:flex;
border-bottom:2px solid var(--accent);
margin-bottom:.5rem;
}

.tab{
flex:1;
padding:.4rem;
text-align:center;
cursor:pointer;
font-weight:bold;
}

.tab.active{
background:var(--accent);
color:white;
border-radius:6px 6px 0 0;
}

.panel{
flex:1;
overflow:auto;
}

.listItem{
display:grid;
grid-template-columns:26px 1fr auto;
align-items:center;
background:var(--secondary-bg);
padding:.45rem .6rem;
margin-bottom:.35rem;
border-radius:6px;
font-size:.85rem;
gap:8px;
word-break:break-all;
}

.deleteBtn{
width:18px;
height:18px;
border-radius:50%;
border:none;
background:#d0d5db;
color:#333;
font-weight:bold;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

.deleteBtn:hover{
background:#b8bec7;
}

.copyBtn{
background:none;
border:none;
cursor:pointer;
font-weight:bold;
color:var(--primary);
font-size:12px;
position:relative;
}

.copyToast{
position:absolute;
left:55px;
top:-2px;
background:#333;
color:white;
padding:3px 7px;
border-radius:6px;
font-size:11px;
opacity:0;
transition:opacity .2s;
pointer-events:none;
}

.copyToast.show{
opacity:1;
}

</style>
</head>

<body>

<header>
<h1>Check Vehicle Registration</h1>

<div class="theme-toggle-container">
<label class="toggle-switch">
<input type="checkbox" id="themeToggle">
<span class="slider"></span>
</label>
</div>

</header>

<main>

<div id="leftPanel">

<input id="regoInput" type="text" placeholder="ENTER REGO OR VIN HERE">

<div id="result"></div>

</div>

<div id="sidePanel">

<div class="tabs">
<div class="tab active" onclick="switchTab('recent')">Recent</div>
<div class="tab" onclick="switchTab('history')">History</div>
</div>

<div id="recentPanel" class="panel"></div>
<div id="historyPanel" class="panel" style="display:none"></div>

</div>

</main>

<script>

const stateLinks={
VIC:"https://www.vicroads.vic.gov.au/registration/buy-sell-or-transfer-a-vehicle/check-vehicle-registration/vehicle-registration-enquiry",
NSW:"https://check-registration.service.nsw.gov.au/?isLoginRequired=true",
QLD:"https://www.service.transport.qld.gov.au/checkrego/application/VehicleSearch.xhtml",
SA:"https://account.ezyreg.sa.gov.au/account/check-registration.htm",
WA:"https://online.transport.wa.gov.au/webExternal/registration/",
TAS:"https://www.transport.tas.gov.au/MRSWebInterface/public/regoLookup/registrationLookup.xhtml",
ACT:"https://rego.act.gov.au/regosoawicket/public/reg/FindRegistrationPage",
NT:"https://nt.gov.au/driving/rego/existing-nt-registration/rego-check",
NHVR:"https://www.service.nhvr.gov.au/#page=informationHub/nHVASAVMSearch"
};

const input=document.getElementById("regoInput");
const result=document.getElementById("result");

let recent=JSON.parse(localStorage.getItem("recentRegos")||"[]");
let history=JSON.parse(localStorage.getItem("regoHistory")||"[]");

function save(){
localStorage.setItem("recentRegos",JSON.stringify(recent));
localStorage.setItem("regoHistory",JSON.stringify(history));
}

function showCopyToast(btn){

const toast=document.createElement("div");
toast.className="copyToast";
toast.textContent="Copied";

btn.appendChild(toast);

setTimeout(()=>toast.classList.add("show"),10);

setTimeout(()=>{
toast.classList.remove("show");
setTimeout(()=>toast.remove(),200);
},900);

}

function copyRego(rego,btn){

navigator.clipboard.writeText(rego);

showCopyToast(btn);

}

function addRecent(rego){

recent=recent.filter(r=>r!==rego);
recent.unshift(rego);
if(recent.length>20) recent.pop();

const d=new Date();
const pad=n=>String(n).padStart(2,'0');

history.unshift({
rego:rego,
date:`${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`
});

save();
renderRecent();
renderHistory();
}

function renderRecent(){

const panel=document.getElementById("recentPanel");
panel.innerHTML="";

recent.forEach((r,i)=>{

const row=document.createElement("div");
row.className="listItem";

const del=document.createElement("button");
del.className="deleteBtn";
del.textContent="✕";
del.onclick=()=>{recent.splice(i,1);save();renderRecent();};

const text=document.createElement("span");
text.textContent=r;

const copy=document.createElement("button");
copy.className="copyBtn";
copy.textContent="Copy";
copy.onclick=()=>copyRego(r,copy);

row.appendChild(del);
row.appendChild(text);
row.appendChild(copy);

panel.appendChild(row);

});

}

function renderHistory(){

const panel=document.getElementById("historyPanel");
panel.innerHTML="";

history.forEach((h,i)=>{

const row=document.createElement("div");
row.className="listItem";

const del=document.createElement("button");
del.className="deleteBtn";
del.textContent="✕";
del.onclick=()=>{history.splice(i,1);save();renderHistory();};

const text=document.createElement("span");
text.textContent=`${h.date} — ${h.rego}`;

const copy=document.createElement("button");
copy.className="copyBtn";
copy.textContent="Copy";
copy.onclick=()=>copyRego(h.rego,copy);

row.appendChild(del);
row.appendChild(text);
row.appendChild(copy);

panel.appendChild(row);

});

}

function buildStates(rego){

let html="<ul>";

Object.entries(stateLinks).forEach(([state,url])=>{
html+=`<li onclick="window.open('${url}','_blank');addRecent('${rego}');input.value='';">${state}</li>`;
});

html+="</ul>";
result.innerHTML=html;

}

input.addEventListener("input",()=>{

let val=input.value.trim().toUpperCase();

if(!val) return;

navigator.clipboard.writeText(val);

buildStates(val);

});

buildStates("");

function switchTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

if(tab==="recent"){
document.getElementById("recentPanel").style.display="block";
document.getElementById("historyPanel").style.display="none";
document.querySelectorAll(".tab")[0].classList.add("active");
}else{
document.getElementById("recentPanel").style.display="none";
document.getElementById("historyPanel").style.display="block";
document.querySelectorAll(".tab")[1].classList.add("active");
}

}

renderRecent();
renderHistory();

const toggle=document.getElementById("themeToggle");

function setTheme(mode){
document.documentElement.setAttribute("data-theme",mode);
localStorage.setItem("theme",mode);
toggle.checked=(mode==="dark");
}

toggle.addEventListener("change",()=>{
setTheme(toggle.checked?"dark":"light");
});

const saved=localStorage.getItem("theme");

if(saved){
setTheme(saved);
}else{
const dark=window.matchMedia("(prefers-color-scheme: dark)").matches;
setTheme(dark?"dark":"light");
}

</script>

</body>
</html>

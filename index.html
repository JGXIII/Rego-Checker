<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHECK VEHICLE REGISTRATION</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23006400%22><path d=%22M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.22.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z%22/></svg>">
<style>
:root {
    --bg:#0d1117; --text:#f0f0f0; --card:#161b22;
    --primary:#ffffff; --secondary-bg:#1c293a;
    --header-bg:#161b22; --header-text:#ffffff;
    --heading-green: #4caf50;
    --accent:#ff7f27; --danger: #ef5350;
    --border: rgba(255,255,255,0.08);
}
[data-theme="light"] {
    --bg:#f7f7f7; --text:#1a1a1a; --card:#ffffff;
    --primary:#002855; --secondary-bg:#e6f0ff;
    --header-bg:#002855; --header-text:#ffffff;
    --heading-green: #2e7d32;
    --danger: #d32f2f;
    --border: rgba(0,0,0,0.08);
}

body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:sans-serif; overflow: hidden; }
header{ background:var(--header-bg); color:var(--header-text); padding:1rem; text-align:center; position:relative; border-bottom: 1px solid var(--border); }
header h1 { margin: 0; display: inline-block; border-bottom: 5px solid var(--heading-green); padding-bottom: 4px; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }
.theme-toggle-container{ position:absolute; right:15px; top:18px; }

main{ display:flex; justify-content:center; padding:1.5rem; gap:1.5rem; max-width:1150px; margin:0 auto; height: calc(100vh - 80px); box-sizing: border-box; }
#leftPanel{ flex:1; }
#sidePanel{ width:360px; background:var(--card); border:2px solid var(--primary); border-radius:10px; height:100%; display:flex; flex-direction:column; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); overflow: hidden; }

/* Tactile Button Effects */
button, li, .rego-link { transition: transform 0.05s cubic-bezier(0.4, 0, 0.2, 1), filter 0.1s ease; cursor: pointer; }
button:active, li:active { transform: scale(0.94); filter: brightness(1.2); }

.history-header { padding: 0.7rem; border-bottom: 2px solid var(--accent); font-weight: bold; text-align: center; background: var(--secondary-bg); color: var(--primary); font-size: 0.85rem; letter-spacing: 1px; flex-shrink: 0; }
#historyPanel { flex:1; overflow-y: auto; padding: 0; scrollbar-width: none; -ms-overflow-style: none; }
#historyPanel::-webkit-scrollbar { display: none; }

input[type="text"]{
    width:100%; padding:0.9rem; font-size:1.2rem; border:3px solid var(--primary); 
    border-radius:10px; background:var(--card); color:var(--text); font-weight:bold; text-transform:uppercase; box-sizing: border-box; outline: none;
}

#stateGrid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:0.5rem; padding:0; list-style:none; margin-top:1rem; }
#stateGrid li{ 
    background:var(--secondary-bg); color:var(--primary); font-weight:800; 
    padding:0.8rem 0.4rem; border-radius:8px; text-align:center; 
    font-size: 0.95rem; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; min-height: 40px;
}
#stateGrid li:hover{ background:var(--accent); color:white; border-color: var(--accent); }

.listItem{ display:grid; grid-template-columns: 24px 1fr auto; align-items:center; background:var(--secondary-bg); padding: 0.6rem 0.8rem; gap:8px; border-left: 4px solid var(--accent); border-bottom: 1px solid var(--border); }
.rego-link { font-size: 0.95rem; font-weight: 800; color: var(--primary); text-transform: uppercase; text-decoration: none; display: inline-block; }
.date-text { font-size: 0.65rem; color: #aaa; font-weight: 600; }

.deleteBtn{ width:22px; height:22px; border-radius:50%; border:none; background:#444; color: #fff; font-size: 10px; display: flex; align-items: center; justify-content: center; }
.deleteBtn:active { background: var(--danger); transform: scale(0.85); }
.copyBtn{ background:var(--accent); color:white; border:none; padding: 6px 10px; border-radius:5px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }

/* Navigation & Tooltips */
.pagination { display: none; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--secondary-bg); border-top: 2px solid var(--accent); flex-shrink: 0; }
.pagination button { background: var(--accent); color: white; border: none; width: 45px; height: 35px; border-radius: 6px; font-size: 1.3rem; font-weight: bold; position: relative; }
.pagination button:disabled { opacity: 0; pointer-events: none; }

.nav-tip { position: absolute; bottom: 50px; background: #333; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.2s; border: 1px solid var(--accent); z-index: 10; }
.pagination button:hover .nav-tip { opacity: 1; }
#newerTip { left: 0; }
#olderTip { right: 0; }
#dateDisplay { font-size: 0.75rem; font-weight: 900; color: var(--primary); text-transform: uppercase; }

/* Splash Screen Fix */
#setupOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: var(--text); padding: 40px; box-sizing: border-box; }
#setupOverlay p { line-height: 1.6; font-size: 1.2rem; max-width: 450px; margin-bottom: 35px; font-weight: 600; }
#setupOverlay button { background: var(--heading-green); color: white; border: none; padding: 25px 50px; font-size: 1.5rem; font-weight: 900; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }

#toast { position: fixed; background: #333; color: #fff; padding: 5px 10px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 1000; border: 1px solid var(--accent); }
#toast.show { opacity: 1; }

.toggle-switch{ position:relative; display:inline-block; width:34px; height:18px; }
.toggle-switch input{ opacity:0; width:0; height:0; }
.slider{ position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; transition:.4s; border-radius:34px; }
.slider:before{ position:absolute; content:""; height:12px; width:12px; left:3px; bottom:3px; background:white; transition:.4s; border-radius:50%; }
input:checked + .slider{ background:var(--accent); }
input:checked + .slider:before{ transform:translateX(16px); }
</style>
</head>
<body>

<div id="setupOverlay" style="display:none;">
    <p>To enable auto-copy registration,<br>please click allow below to start.</p>
    <button onclick="triggerPermissionPrompt()">ALLOW & START</button>
</div>

<header>
    <h1>CHECK VEHICLE REGISTRATION</h1>
    <div class="theme-toggle-container">
        <label class="toggle-switch"><input type="checkbox" id="themeToggle"><span class="slider"></span></label>
    </div>
</header>

<main>
    <div id="leftPanel">
        <input id="regoInput" type="text" placeholder="SEARCH REGO OR VIN" autofocus autocomplete="off">
        <ul id="stateGrid"></ul>
    </div>

    <div id="sidePanel">
        <div class="history-header">HISTORY</div>
        <div id="historyPanel"></div>
        <div class="pagination" id="paginationBar">
            <button id="newerBtn" onclick="changeDate(-1)">
                &#8592; <span id="newerTip" class="nav-tip"></span>
            </button>
            <div id="dateDisplay">Date</div>
            <button id="olderBtn" onclick="changeDate(1)">
                &#8594; <span id="olderTip" class="nav-tip"></span>
            </button>
        </div>
    </div>
</main>

<div id="toast">Copied</div>

<script>
const stateLinks = { VIC: "https://www.vicroads.vic.gov.au/registration/buy-sell-or-transfer-a-vehicle/check-vehicle-registration/vehicle-registration-enquiry", NSW: "https://check-registration.service.nsw.gov.au/?isLoginRequired=true", QLD: "https://www.service.transport.qld.gov.au/checkrego/application/VehicleSearch.xhtml", SA: "https://account.ezyreg.sa.gov.au/account/check-registration.htm", WA: "https://online.transport.wa.gov.au/webExternal/registration/", TAS: "https://www.transport.tas.gov.au/MRSWebInterface/public/regoLookup/registrationLookup.xhtml", ACT: "https://rego.act.gov.au/regosoawicket/public/reg/FindRegistrationPage", NT: "https://nt.gov.au/driving/rego/existing-nt-registration/rego-check", NHVR: "https://www.service.nhvr.gov.au/#page=informationHub/nHVASAVMSearch" };
const shorthand = { 'V': 'VIC', 'N': 'NSW', 'Q': 'QLD', 'S': 'SA', 'W': 'WA', 'T': 'TAS', 'A': 'ACT', 'D': 'NT', 'H': 'NHVR' };

const input = document.getElementById("regoInput");
const historyPanel = document.getElementById("historyPanel");
const stateGrid = document.getElementById("stateGrid");
const toast = document.getElementById("toast");
const paginationBar = document.getElementById("paginationBar");
const dateDisplay = document.getElementById("dateDisplay");

let history = JSON.parse(localStorage.getItem("regoHistory") || "[]");
let dateIndex = 0;

// THE PERMISSION TRIGGER
if (!localStorage.getItem("clipboard_allowed")) {
    document.getElementById("setupOverlay").style.display = "flex";
}

async function triggerPermissionPrompt() {
    try {
        // We attempt to READ the clipboard. 
        // This is what forces the "Allow regochecker to see text and images..." popup.
        await navigator.clipboard.readText();
        finishSetup();
    } catch (e) {
        // If they haven't allowed it yet, we attempt a write as well to be sure
        try {
            await navigator.clipboard.writeText(" ");
            finishSetup();
        } catch (err) {
            // Fallback for browsers that require a manual paste event
            finishSetup();
        }
    }
}

function finishSetup() {
    localStorage.setItem("clipboard_allowed", "true");
    document.getElementById("setupOverlay").style.display = "none";
    input.focus();
}

// Global Key Listeners
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') {
        if (document.activeElement !== input) input.focus();
        return;
    }
    if (e.ctrlKey || e.altKey || e.metaKey || document.activeElement === input) return;
    if (e.key.length === 1) input.focus();
});

async function copyWithToast(text, event) {
    if (!text) return;
    const val = text.toUpperCase();
    try { 
        await navigator.clipboard.writeText(val); 
    } catch (err) {
        const el = document.createElement('textarea'); 
        el.value = val; 
        document.body.appendChild(el); 
        el.select(); 
        document.execCommand('copy'); 
        document.body.removeChild(el);
    }
    const rect = (event && event.target) ? event.target.getBoundingClientRect() : {top: 0, right: 0};
    toast.style.top = `${rect.top}px`; toast.style.left = `${rect.right + 10}px`;
    toast.classList.add("show"); setTimeout(() => toast.classList.remove("show"), 1000);
}

function initButtons() {
    stateGrid.innerHTML = "";
    Object.keys(stateLinks).forEach(state => {
        const li = document.createElement("li");
        li.textContent = state; 
        li.onclick = (e) => openState(state, input.value.trim().split(/\s+/).slice(0, -1).join(" ") || input.value.trim(), e);
        stateGrid.appendChild(li);
    });
}

function processInput() {
    const raw = input.value.toUpperCase().trim();
    const parts = raw.split(/\s+/);
    if (parts.length > 1) {
        const lastPart = parts[parts.length - 1];
        if (shorthand[lastPart]) {
            const rego = parts.slice(0, -1).join(" ");
            openState(shorthand[lastPart], rego, { target: input });
            input.value = "";
        }
    }
}

function getTodayString() {
    const d = new Date();
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function openState(state, rego, event) {
    window.open(stateLinks[state], '_blank');
    if (rego && rego.length > 1) {
        copyWithToast(rego, event);
        const d = new Date();
        const dateKey = getTodayString();
        const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        
        if(history.length === 0 || history[0].rego !== rego.toUpperCase() || history[0].state !== state) {
            history.unshift({ rego: rego.toUpperCase(), state, time: timeStr, date: dateKey });
            localStorage.setItem("regoHistory", JSON.stringify(history));
            dateIndex = 0; 
            renderHistory();
        }
        input.value = "";
    }
}

function renderHistory() {
    historyPanel.innerHTML = "";
    if (history.length === 0) { paginationBar.style.display = "none"; return; }
    paginationBar.style.display = "flex";

    const uniqueDates = [...new Set(history.map(item => item.date))];
    if (dateIndex >= uniqueDates.length) dateIndex = uniqueDates.length - 1;
    if (dateIndex < 0) dateIndex = 0;

    const targetDate = uniqueDates[dateIndex];
    const today = getTodayString();
    dateDisplay.textContent = (targetDate === today) ? "TODAY" : targetDate;

    const olderBtn = document.getElementById("olderBtn");
    const newerBtn = document.getElementById("newerBtn");
    const olderTip = document.getElementById("olderTip");
    const newerTip = document.getElementById("newerTip");

    if (dateIndex < uniqueDates.length - 1) {
        olderBtn.disabled = false;
        olderTip.textContent = `Go to ${uniqueDates[dateIndex+1]}`;
    } else { olderBtn.disabled = true; }

    if (dateIndex > 0) {
        newerBtn.disabled = false;
        const nextLabel = uniqueDates[dateIndex-1];
        newerTip.textContent = (nextLabel === today) ? "Go to Today" : `Go to ${nextLabel}`;
    } else { newerBtn.disabled = true; }

    const entriesForDate = history.filter(item => item.date === targetDate);
    entriesForDate.forEach((item) => {
        const originalIndex = history.findIndex(h => h === item);
        const row = document.createElement("div");
        row.className = "listItem";
        row.innerHTML = `<button class="deleteBtn" onclick="deleteHistory(${originalIndex})">✕</button>
            <div>
                <a class="rego-link" onclick="openState('${item.state}', '${item.rego}', event)">${item.rego}</a>
                <br><span class="date-text">${item.state} • ${item.time}</span>
            </div>
            <button class="copyBtn" onclick="copyWithToast('${item.rego}', event)">Copy</button>`;
        historyPanel.appendChild(row);
    });
}

function changeDate(dir) { dateIndex += dir; renderHistory(); historyPanel.scrollTop = 0; }

function deleteHistory(i) { 
    history.splice(i, 1); 
    localStorage.setItem("regoHistory", JSON.stringify(history)); 
    renderHistory(); 
}

input.addEventListener("input", processInput);
const themeToggle = document.getElementById("themeToggle");
themeToggle.addEventListener("change", () => {
    const mode = themeToggle.checked ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", mode);
    localStorage.setItem("theme", mode);
});
const savedTheme = localStorage.getItem("theme") || "dark";
document.documentElement.setAttribute("data-theme", savedTheme);
themeToggle.checked = (savedTheme === "dark");
initButtons();
renderHistory();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Rego Search</title>
<style>
:root{
    --bg:#f7f7f7; --text:#1a1a1a; --card:#ffffff;
    --primary:#002855; --accent:#ff7f27; --secondary-bg:#e6f0ff;
    --header-bg:#002855; --header-text:#ffffff;
}
[data-theme="dark"]{
    --bg:#0d1117; --text:#f0f0f0; --card:#161b22;
    --primary:#ffffff; --secondary-bg:#1c293a;
    --header-bg:#161b22; --header-text:#ffffff;
}

body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:sans-serif; }
header{ background:var(--header-bg); color:var(--header-text); padding:1rem; text-align:center; position:relative; }
.theme-toggle-container{ position:absolute; right:15px; top:20px; }

main{ display:flex; justify-content:center; padding:1.5rem; gap:2rem; max-width:1200px; margin:0 auto; }
#leftPanel{ flex:1; }
#sidePanel{ width:400px; background:var(--card); border:2px solid var(--primary); border-radius:10px; height:80vh; display:flex; flex-direction:column; }

.history-header { padding: 1rem; border-bottom: 2px solid var(--accent); font-weight: bold; text-align: center; background: var(--secondary-bg); color: var(--primary); }
#historyPanel { flex:1; overflow-y:auto; padding: 0.5rem; }

input[type="text"]{
    width:100%; padding:1.2rem; font-size:1.4rem; border:3px solid var(--primary); 
    border-radius:8px; background:var(--card); color:var(--text); font-weight:bold; text-transform:uppercase; box-sizing: border-box;
}

#result ul{ display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; padding:0; list-style:none; margin-top:1rem; }
#result li{ background:var(--secondary-bg); color:var(--primary); font-weight:bold; padding:0.8rem; border-radius:8px; text-align:center; cursor:pointer; }
#result li:hover{ background:var(--accent); color:white; }

.listItem{
    display:grid; grid-template-columns: 30px 1fr auto; align-items:center;
    background:var(--secondary-bg); padding:1rem; margin-bottom:0.6rem;
    border-radius:8px; gap:10px; border-left: 4px solid var(--accent);
}
.rego-text { font-size: 1.3rem; font-weight: 800; color: var(--primary); }
.date-text { font-size: 0.75rem; color: #666; display: block; }

.deleteBtn{ width:24px; height:24px; border-radius:50%; border:none; background:#d0d5db; cursor:pointer; }
.copyBtn{ background:var(--primary); color:white; border:none; padding: 5px 10px; border-radius:4px; cursor:pointer; font-size: 0.8rem; }

/* Toggle Switch */
.toggle-switch{ position:relative; display:inline-block; width:40px; height:20px; }
.toggle-switch input{ opacity:0; width:0; height:0; }
.slider{ position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; transition:.4s; border-radius:34px; }
.slider:before{ position:absolute; content:""; height:14px; width:14px; left:3px; bottom:3px; background:white; transition:.4s; border-radius:50%; }
input:checked + .slider{ background:var(--accent); }
input:checked + .slider:before{ transform:translateX(20px); }
</style>
</head>
<body>

<header>
    <h1>Vehicle Lookup</h1>
    <div class="theme-toggle-container">
        <label class="toggle-switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>
    </div>
</header>

<main>
    <div id="leftPanel">
        <input id="regoInput" type="text" placeholder="REGO [SPACE] LETTER (E.G. ABC123 V)" autofocus>
        <div id="result"></div>
    </div>

    <div id="sidePanel">
        <div class="history-header">SEARCH HISTORY</div>
        <div id="historyPanel" class="panel"></div>
    </div>
</main>

<script>
const stateLinks = {
    VIC: "https://www.vicroads.vic.gov.au/registration/buy-sell-or-transfer-a-vehicle/check-vehicle-registration/vehicle-registration-enquiry",
    NSW: "https://check-registration.service.nsw.gov.au/?isLoginRequired=true",
    QLD: "https://www.service.transport.qld.gov.au/checkrego/application/VehicleSearch.xhtml",
    SA: "https://account.ezyreg.sa.gov.au/account/check-registration.htm",
    WA: "https://online.transport.wa.gov.au/webExternal/registration/",
    TAS: "https://www.transport.tas.gov.au/MRSWebInterface/public/regoLookup/registrationLookup.xhtml",
    ACT: "https://rego.act.gov.au/regosoawicket/public/reg/FindRegistrationPage",
    NT: "https://nt.gov.au/driving/rego/existing-nt-registration/rego-check",
    NHVR: "https://www.service.nhvr.gov.au/#page=informationHub/nHVASAVMSearch"
};

const shorthand = {
    'V': 'VIC', 'N': 'NSW', 'Q': 'QLD', 'S': 'SA', 
    'W': 'WA', 'T': 'TAS', 'A': 'ACT', 'D': 'NT', 'H': 'NHVR'
};

const input = document.getElementById("regoInput");
const historyPanel = document.getElementById("historyPanel");
let history = JSON.parse(localStorage.getItem("regoHistory") || "[]");

function processInput() {
    let val = input.value.toUpperCase().trim();
    if (!val) { renderButtons(""); return; }

    const parts = val.split(" ");
    const rego = parts[0];
    const trigger = parts[1];

    // If there's a shorthand letter after a space
    if (trigger && shorthand[trigger]) {
        openState(shorthand[trigger], rego);
        input.value = ""; 
        return;
    }

    renderButtons(rego);
}

function openState(state, rego) {
    if (!rego) return;
    window.open(stateLinks[state], '_blank');
    addToHistory(rego, state);
    input.value = "";
    renderButtons("");
}

function addToHistory(rego, state) {
    const d = new Date();
    const timeStr = `${d.getDate()}/${d.getMonth()+1} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    
    history.unshift({ rego, state, date: timeStr });
    if (history.length > 50) history.pop();
    
    localStorage.setItem("regoHistory", JSON.stringify(history));
    renderHistory();
}

function renderButtons(rego) {
    const resultDiv = document.getElementById("result");
    if (!rego) { resultDiv.innerHTML = ""; return; }

    let html = "<ul>";
    Object.keys(stateLinks).forEach(state => {
        html += `<li onclick="openState('${state}', '${rego}')">${state}</li>`;
    });
    html += "</ul>";
    resultDiv.innerHTML = html;
}

function renderHistory() {
    historyPanel.innerHTML = "";
    history.forEach((item, i) => {
        const row = document.createElement("div");
        row.className = "listItem";
        row.innerHTML = `
            <button class="deleteBtn" onclick="deleteHistory(${i})">✕</button>
            <div>
                <span class="rego-text">${item.rego}</span>
                <span class="date-text">${item.state} • ${item.date}</span>
            </div>
            <button class="copyBtn" onclick="navigator.clipboard.writeText('${item.rego}')">Copy</button>
        `;
        historyPanel.appendChild(row);
    });
}

function deleteHistory(i) {
    history.splice(i, 1);
    localStorage.setItem("regoHistory", JSON.stringify(history));
    renderHistory();
}

// Theme Logic
const toggle = document.getElementById("themeToggle");
function setTheme(mode) {
    document.documentElement.setAttribute("data-theme", mode);
    localStorage.setItem("theme", mode);
    toggle.checked = (mode === "dark");
}

input.addEventListener("input", processInput);
toggle.addEventListener("change", () => setTheme(toggle.checked ? "dark" : "light"));

// Init
const savedTheme = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
setTheme(savedTheme);
renderHistory();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHECK VEHICLE REGISTRATION</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23006400%22><path d=%22M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.22.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z%22/></svg>">
<style>
:root {
    --bg:#0d1117; --text:#f0f0f0; --card:#161b22;
    --primary:#ffffff; --secondary-bg:#1c293a;
    --header-bg:#161b22; --header-text:#ffffff;
    --heading-green: #4caf50;
    --accent:#ff7f27; --danger: #ef5350;
    --border: rgba(255,255,255,0.08);
}
[data-theme="light"] {
    --bg:#f7f7f7; --text:#1a1a1a; --card:#ffffff;
    --primary:#002855; --secondary-bg:#e6f0ff;
    --header-bg:#002855; --header-text:#ffffff;
    --heading-green: #2e7d32;
    --danger: #d32f2f;
    --border: rgba(0,0,0,0.08);
}

body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:sans-serif; overflow-x: hidden; }
header{ background:var(--header-bg); color:var(--header-text); padding:1rem; text-align:center; position:relative; border-bottom: 1px solid var(--border); z-index: 100; }
header h1 { margin: 0; display: inline-block; border-bottom: 5px solid var(--heading-green); padding-bottom: 4px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }

main{ display:flex; justify-content:center; padding:1rem; gap:1.5rem; max-width:1150px; margin:0 auto; min-height: calc(100vh - 70px); box-sizing: border-box; }
#leftPanel{ flex:1; }
#sidePanel{ width:360px; background:var(--card); border:2px solid var(--primary); border-radius:10px; display:flex; flex-direction:column; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); overflow: hidden; height: fit-content; max-height: 85vh; }

/* Tactile Buttons */
button, li, .rego-link { transition: transform 0.05s ease, filter 0.1s ease; cursor: pointer; -webkit-tap-highlight-color: transparent; }
button:active, li:active { transform: scale(0.94); filter: brightness(1.2); }

#regoInput{
    width:100%; padding:1rem; font-size:1.2rem; border:3px solid var(--primary); 
    border-radius:10px; background:var(--card); color:var(--text); font-weight:bold; text-transform:uppercase; box-sizing: border-box; outline: none;
}

#stateGrid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:0.5rem; padding:0; list-style:none; margin-top:1rem; }
#stateGrid li{ 
    background:var(--secondary-bg); color:var(--primary); font-weight:800; 
    padding:1rem 0.4rem; border-radius:8px; text-align:center; 
    font-size: 0.95rem; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; min-height: 50px;
}
#stateGrid li:hover{ background:var(--accent); color:white; }

.history-header { padding: 0.8rem; border-bottom: 2px solid var(--accent); font-weight: bold; text-align: center; background: var(--secondary-bg); color: var(--primary); font-size: 0.85rem; letter-spacing: 1px; }
#historyPanel { flex:1; overflow-y: auto; padding: 0; min-height: 200px; }

.listItem{ display:grid; grid-template-columns: 35px 1fr auto; align-items:center; background:var(--secondary-bg); padding: 0.8rem; gap:10px; border-left: 5px solid var(--accent); border-bottom: 1px solid var(--border); }
.rego-link { font-size: 1rem; font-weight: 800; color: var(--primary); text-decoration: none; }
.date-text { font-size: 0.7rem; color: #aaa; font-weight: 600; }

.deleteBtn{ width:28px; height:28px; border-radius:50%; border:none; background:#444; color: #fff; font-size: 12px; display: flex; align-items: center; justify-content: center; }
.copyBtn{ background:var(--accent); color:white; border:none; padding: 8px 12px; border-radius:6px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }

/* Navigation */
.pagination { display: none; justify-content: space-between; align-items: center; padding: 12px; background: var(--secondary-bg); border-top: 2px solid var(--accent); }
.pagination button { background: var(--accent); color: white; border: none; width: 50px; height: 40px; border-radius: 6px; font-size: 1.4rem; position: relative; }
.nav-tip { position: absolute; bottom: 55px; background: #333; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; opacity: 0; pointer-events: none; border: 1px solid var(--accent); white-space: nowrap; transition: 0.2s; }
.pagination button:hover .nav-tip { opacity: 1; }
#dateDisplay { font-size: 0.8rem; font-weight: 900; color: var(--primary); }

/* Theme Toggle */
.theme-toggle-container{ position:absolute; right:15px; top:18px; }
.toggle-switch{ position:relative; display:inline-block; width:34px; height:18px; }
.toggle-switch input{ opacity:0; width:0; height:0; }
.slider{ position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; transition:.4s; border-radius:34px; }
.slider:before{ position:absolute; content:""; height:12px; width:12px; left:3px; bottom:3px; background:white; transition:.4s; border-radius:50%; }
input:checked + .slider{ background:var(--accent); }
input:checked + .slider:before{ transform:translateX(16px); }

/* Splash Screen */
#setupOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
#setupOverlay button { background: var(--heading-green); color: white; border: none; padding: 20px 60px; font-size: 1.6rem; font-weight: 900; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }

#toast { position: fixed; background: #333; color: #fff; padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 1000; border: 1px solid var(--accent); }
#toast.show { opacity: 1; }

/* MOBILE RESPONSIVE OVERRIDES */
@media (max-width: 800px) {
    main { flex-direction: column; height: auto; overflow-y: visible; padding: 0.8rem; }
    #sidePanel { width: 100%; max-height: none; margin-top: 1rem; }
    header h1 { font-size: 1rem; }
    .nav-tip { display: none; } /* Hide tooltips on mobile to prevent clutter */
}
</style>
</head>
<body>

<div id="setupOverlay" style="display:none;">
    <p style="font-weight:600; margin-bottom:30px; line-height:1.5;">To enable auto-copy registration,<br>please click allow below to start.</p>
    <button onclick="triggerPermissionPrompt()">ALLOW</button>
</div>

<header>
    <h1>CHECK VEHICLE REGISTRATION</h1>
    <div class="theme-toggle-container">
        <label class="toggle-switch"><input type="checkbox" id="themeToggle"><span class="slider"></span></label>
    </div>
</header>

<main>
    <div id="leftPanel">
        <input id="regoInput" type="text" placeholder="SEARCH REGO OR VIN" autofocus autocomplete="off">
        <ul id="stateGrid"></ul>
    </div>

    <div id="sidePanel">
        <div class="history-header">HISTORY</div>
        <div id="historyPanel"></div>
        <div class="pagination" id="paginationBar">
            <button id="newerBtn" onclick="changeDate(-1)">&#8592;<span id="newerTip" class="nav-tip"></span></button>
            <div id="dateDisplay">Date</div>
            <button id="olderBtn" onclick="changeDate(1)">&#8594;<span id="olderTip" class="nav-tip"></span></button>
        </div>
    </div>
</main>

<div id="toast">Copied</div>

<script>
const stateLinks = { VIC: "https://www.vicroads.vic.gov.au/registration/buy-sell-or-transfer-a-vehicle/check-vehicle-registration/vehicle-registration-enquiry", NSW: "https://check-registration.service.nsw.gov.au/?isLoginRequired=true", QLD: "https://www.service.transport.qld.gov.au/checkrego/application/VehicleSearch.xhtml", SA: "https://account.ezyreg.sa.gov.au/account/check-registration.htm", WA: "https://online.transport.wa.gov.au/webExternal/registration/", TAS: "https://www.transport.tas.gov.au/MRSWebInterface/public/regoLookup/registrationLookup.xhtml", ACT: "https://rego.act.gov.au/regosoawicket/public/reg/FindRegistrationPage", NT: "https://nt.gov.au/driving/rego/existing-nt-registration/rego-check", NHVR: "https://www.service.nhvr.gov.au/#page=informationHub/nHVASAVMSearch" };
const shorthand = { 'V': 'VIC', 'N': 'NSW', 'Q': 'QLD', 'S': 'SA', 'W': 'WA', 'T': 'TAS', 'A': 'ACT', 'D': 'NT', 'H': 'NHVR' };

const input = document.getElementById("regoInput");
const historyPanel = document.getElementById("historyPanel");
const stateGrid = document.getElementById("stateGrid");
const toast = document.getElementById("toast");
const paginationBar = document.getElementById("paginationBar");
const dateDisplay = document.getElementById("dateDisplay");

let history = JSON.parse(localStorage.getItem("regoHistory") || "[]");
let dateIndex = 0;

if (!localStorage.getItem("clipboard_allowed")) {
    document.getElementById("setupOverlay").style.display = "flex";
}

async function triggerPermissionPrompt() {
    try {
        await navigator.clipboard.readText();
        finishSetup();
    } catch (e) {
        try { await navigator.clipboard.writeText(" "); finishSetup(); } catch (err) { finishSetup(); }
    }
}

function finishSetup() {
    localStorage.setItem("clipboard_allowed", "true");
    document.getElementById("setupOverlay").style.display = "none";
    input.focus();
}

async function copyWithToast(text, event) {
    if (!text) return;
    const val = text.toUpperCase();
    try { await navigator.clipboard.writeText(val); } catch (err) {
        const el = document.createElement('textarea'); el.value = val; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
    }
    const rect = (event && event.target) ? event.target.getBoundingClientRect() : {top: 20, right: 20};
    toast.style.top = `${Math.max(10, rect.top - 40)}px`; toast.style.left = `${rect.left}px`;
    toast.classList.add("show"); setTimeout(() => toast.classList.remove("show"), 1000);
}

function initButtons() {
    stateGrid.innerHTML = "";
    Object.keys(stateLinks).forEach(state => {
        const li = document.createElement("li");
        li.textContent = state; 
        li.onclick = (e) => openState(state, input.value.trim().split(/\s+/).slice(0, -1).join(" ") || input.value.trim(), e);
        stateGrid.appendChild(li);
    });
}

function processInput() {
    const raw = input.value.toUpperCase().trim();
    const parts = raw.split(/\s+/);
    if (parts.length > 1) {
        const lastPart = parts[parts.length - 1];
        if (shorthand[lastPart]) {
            const rego = parts.slice(0, -1).join(" ");
            openState(shorthand[lastPart], rego, { target: input });
            input.value = "";
        }
    }
}

function getTodayString() {
    const d = new Date();
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function openState(state, rego, event) {
    window.open(stateLinks[state], '_blank');
    if (rego && rego.length > 1) {
        copyWithToast(rego, event);
        const d = new Date();
        const dateKey = getTodayString();
        const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        
        if(history.length === 0 || history[0].rego !== rego.toUpperCase() || history[0].state !== state) {
            history.unshift({ rego: rego.toUpperCase(), state, time: timeStr, date: dateKey });
            localStorage.setItem("regoHistory", JSON.stringify(history));
            dateIndex = 0; renderHistory();
        }
        input.value = "";
    }
}

function renderHistory() {
    historyPanel.innerHTML = "";
    if (history.length === 0) { paginationBar.style.display = "none"; return; }
    paginationBar.style.display = "flex";

    const uniqueDates = [...new Set(history.map(item => item.date))];
    if (dateIndex >= uniqueDates.length) dateIndex = uniqueDates.length - 1;
    if (dateIndex < 0) dateIndex = 0;

    const targetDate = uniqueDates[dateIndex];
    const today = getTodayString();
    dateDisplay.textContent = (targetDate === today) ? "TODAY" : targetDate;

    document.getElementById("olderBtn").disabled = (dateIndex >= uniqueDates.length - 1);
    document.getElementById("newerBtn").disabled = (dateIndex <= 0);
    
    if(!document.getElementById("olderBtn").disabled) 
        document.getElementById("olderTip").textContent = `Go to ${uniqueDates[dateIndex+1]}`;
    if(!document.getElementById("newerBtn").disabled) 
        document.getElementById("newerTip").textContent = (uniqueDates[dateIndex-1] === today) ? "Go to Today" : `Go to ${uniqueDates[dateIndex-1]}`;

    history.filter(item => item.date === targetDate).forEach((item) => {
        const originalIndex = history.findIndex(h => h === item);
        const row = document.createElement("div");
        row.className = "listItem";
        row.innerHTML = `<button class="deleteBtn" onclick="deleteHistory(${originalIndex})">✕</button>
            <div>
                <a class="rego-link" onclick="openState('${item.state}', '${item.rego}', event)">${item.rego}</a>
                <br><span class="date-text">${item.state} • ${item.time}</span>
            </div>
            <button class="copyBtn" onclick="copyWithToast('${item.rego}', event)">Copy</button>`;
        historyPanel.appendChild(row);
    });
}

function changeDate(dir) { dateIndex += dir; renderHistory(); }
function deleteHistory(i) { history.splice(i, 1); localStorage.setItem("regoHistory", JSON.stringify(history)); renderHistory(); }

input.addEventListener("input", processInput);
const themeToggle = document.getElementById("themeToggle");
themeToggle.addEventListener("change", () => {
    const mode = themeToggle.checked ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", mode);
    localStorage.setItem("theme", mode);
});
const savedTheme = localStorage.getItem("theme") || "dark";
document.documentElement.setAttribute("data-theme", savedTheme);
themeToggle.checked = (savedTheme === "dark");
initButtons();
renderHistory();
</script>
</body>
</html>
